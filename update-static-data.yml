name: Update static balise data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask playwright gunicorn

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Generate static JSON files
        run: python update_static_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/api_idag.json data/api_imorgen.json
          git diff --cached --quiet && exit 0
          git commit -m "Oppdater statiske balise-data"
          git push
